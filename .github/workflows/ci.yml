name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest coverage jsonschema ruff

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Validate example 01
        run: python3 scripts/validate-config-json.py examples/01-simple-edit.json

      - name: Validate example 02
        run: python3 scripts/validate-config-json.py examples/02-multi-file-edit.json

      - name: Validate example 03
        run: python3 scripts/validate-config-json.py examples/03-file-operations.json

      - name: Dry-run example 01
        run: python3 scripts/execute-json-ops.py examples/01-simple-edit.json --dry-run

      - name: Dry-run example 02
        run: python3 scripts/execute-json-ops.py examples/02-multi-file-edit.json --dry-run

      - name: Validate example 04
        run: python3 scripts/validate-config-json.py examples/04-modern-code-edit.json

      - name: Dry-run example 03
        run: python3 scripts/execute-json-ops.py examples/03-file-operations.json --dry-run

      - name: Dry-run example 04
        run: python3 scripts/execute-json-ops.py examples/04-modern-code-edit.json --dry-run

      - name: Restore script smoke test
        run: python3 scripts/restore-backup.py --list

      - name: Run tests with coverage
        run: coverage run -m pytest tests/ -v

      - name: Check coverage
        run: coverage report --fail-under=75
