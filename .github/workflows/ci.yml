name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check scripts/ tests/

      - name: Validate all examples
        run: |
          for f in examples/*.json; do
            python3 scripts/validate-config-json.py "$f"
          done

      - name: Dry-run all examples
        run: |
          for f in examples/*.json; do
            python3 scripts/execute-json-ops.py "$f" --dry-run
          done

      - name: Restore script smoke test
        run: python3 scripts/restore-backup.py --list

      - name: Version check
        run: python3 scripts/execute-json-ops.py --version

      - name: Run tests with coverage
        run: coverage run -m pytest tests/ -v

      - name: Check coverage
        run: coverage report --fail-under=75
